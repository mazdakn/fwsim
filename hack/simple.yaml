Policies:
  - match:
    - src: 192.168.1.0/24:*
      dst: 1.1.1.1:80
      proto: tcp
    action: accept
  - match:
    - dst: 1.1.1.1:80
      proto: 80
    action: Drop
traffic:
  - src: 192.168.10.1:*
    dst: 1.1.1.1:80
    proto: tcp
    result: Accept
  - src: *
    dst: 2.2.2.2:*
    proto: udp
    result: Reject


