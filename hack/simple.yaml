rules:
  - src_net: 192.168.1.0/24
    dst_net: 1.1.1.1:80
    dst_port: 80
    protocol: tcp
    action: accept
  - dst_net: 1.1.1.1
    dst_port: 80
    protocol: 80
    action: drop
traffic:
  - src_net: 192.168.10.1
    dst_net: 1.1.1.1
    dst_port: 80
    protocol: tcp
    result: accept
  - dst_net: 2.2.2.2
    proto: udp
    result: reject
